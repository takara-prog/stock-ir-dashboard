<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ストックIRダッシュボード</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f0f; color: #e0e0e0; min-height: 100vh; }
.container { max-width: 1100px; margin: 0 auto; padding: 2rem 1rem; }
h1 { font-size: 22px; font-weight: 500; margin-bottom: 4px; }
.sub { font-size: 13px; color: #888; margin-bottom: 2rem; }
.tabs { display: flex; gap: 8px; margin-bottom: 1.25rem; }
.tab { font-size: 13px; padding: 6px 16px; border-radius: 8px; border: 1px solid #333; background: transparent; color: #888; cursor: pointer; }
.tab.active { background: #1e1e1e; color: #e0e0e0; font-weight: 500; }
.panel { display: none; }
.panel.active { display: block; }
textarea { width: 100%; min-height: 120px; background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 10px 12px; color: #e0e0e0; font-size: 14px; resize: vertical; font-family: inherit; }
.row { display: flex; gap: 8px; }
.row input { flex: 1; background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 8px 12px; color: #e0e0e0; font-size: 14px; }
button { background: transparent; border: 1px solid #444; border-radius: 8px; color: #e0e0e0; padding: 8px 16px; font-size: 14px; cursor: pointer; }
button:hover { background: #1e1e1e; }
.analyze-btn { width: 100%; margin-top: 8px; padding: 10px; }
.api-row { display: flex; gap: 8px; margin-bottom: 1.5rem; align-items: center; }
.api-row input { flex: 1; background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 8px 12px; color: #e0e0e0; font-size: 14px; }
.api-label { font-size: 13px; color: #888; white-space: nowrap; }
.summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-bottom: 1.5rem; }
.scard { background: #1a1a1a; border-radius: 8px; padding: 12px; }
.scard-label { font-size: 12px; color: #888; margin-bottom: 4px; }
.scard-val { font-size: 22px; font-weight: 500; }
.badge { display: inline-block; font-size: 11px; font-weight: 500; padding: 3px 10px; border-radius: 20px; }
.badge-high { background: #3d1a1a; color: #f87171; }
.badge-mid { background: #3d2e0f; color: #fbbf24; }
.badge-low { background: #1a2e1a; color: #4ade80; }
.impact-group { margin-bottom: 1.25rem; }
.impact-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.statement-card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px; padding: 12px 14px; margin-bottom: 8px; }
.statement-text { font-size: 14px; line-height: 1.6; margin-bottom: 8px; }
.axes { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 6px; }
.axis { font-size: 12px; color: #888; background: #111; border-radius: 6px; padding: 4px 8px; }
.axis span { font-weight: 500; color: #e0e0e0; }
.note { font-size: 12px; color: #666; margin-top: 8px; border-top: 1px solid #2a2a2a; padding-top: 6px; }
.loading { color: #888; font-size: 14px; padding: 12px 0; }
.error { color: #f87171; font-size: 14px; padding: 8px 0; }
.section-label { font-size: 12px; font-weight: 500; color: #666; letter-spacing: 0.05em; margin-bottom: 8px; margin-top: 1.25rem; }
.verdict { font-size: 13px; font-weight: 500; color: #e0e0e0; margin-top: 4px; }
</style>
</head>
<body>
<div class="container">
  <h1>ストックIRダッシュボード</h1>
  <p class="sub">経営陣の発言を影響度別に分類・読み解きます</p>

  <div class="api-row">
    <span class="api-label">APIキー</span>
    <input type="password" id="api-key" placeholder="Anthropic APIキーを入力（sk-ant-...）" />
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('paste')">テキスト貼り付け</button>
    <button class="tab" onclick="switchTab('auto')">企業名で自動取得</button>
  </div>

  <div id="panel-paste" class="panel active">
    <textarea id="paste-input" placeholder="決算説明会・株主総会・IRレポートなど、分析したい発言を貼り付けてください..."></textarea>
    <button class="analyze-btn" onclick="analyze('paste')">この発言を分析する →</button>
  </div>

  <div id="panel-auto" class="panel">
    <div class="row">
      <input type="text" id="company-input" placeholder="企業名または証券コード（例：味の素、2802）" />
      <button onclick="analyze('auto')">取得して分析 →</button>
    </div>
  </div>

  <div id="results-area"></div>
</div>

<script>
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', ['paste','auto'][i] === tab));
  document.getElementById('panel-paste').classList.toggle('active', tab === 'paste');
  document.getElementById('panel-auto').classList.toggle('active', tab === 'auto');
}

async function callClaude(messages) {
  const apiKey = document.getElementById('api-key').value.trim();
  if (!apiKey) { alert('APIキーを入力してください'); throw new Error('no key'); }
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-allow-browser": "true"
    },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 1500,
      tools: [{ type: "web_search_20250305", name: "web_search" }],
      messages
    })
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  return data.content.map(b => b.type === "text" ? b.text : "").filter(Boolean).join("\n");
}

function extractJSON(text) {
  const match = text.match(/\{[\s\S]*\}/);
  if (match) return JSON.parse(match[0]);
  throw new Error("JSON not found");
}

async function analyze(mode) {
  const area = document.getElementById('results-area');
  area.innerHTML = '<div class="loading">分析中です（少々お待ちください）...</div>';
  try {
    let prompt;
    if (mode === 'paste') {
      const input = document.getElementById('paste-input').value.trim();
      if (!input) { area.innerHTML = '<div class="error">発言を入力してください</div>'; return; }
      prompt = `以下のIR発言を分析し、必ずJSONのみで返してください。前置き不要。\n\n発言:\n${input}\n\n形式:{"company":"","summary":{"high":0,"mid":0,"low":0,"verdict":"総評"},"statements":[{"text":"発言要約30字以内","impact":"high","axes":{"経営思想":"一言","資本配分":"一言","株主還元":"一言","成長投資":"一言","危機対応":"一言","競争優位":"一言","経営スタイル":"一言"},"note":"本音度20字"}]}`;
    } else {
      const company = document.getElementById('company-input').value.trim();
      if (!company) { area.innerHTML = '<div class="error">企業名を入力してください</div>'; return; }
      prompt = `${company}の最新IR・決算説明会の発言をウェブ検索で3〜4件調べ、JSONのみで返してください。前置き不要。\n\n形式:{"company":"${company}","summary":{"high":0,"mid":0,"low":0,"verdict":"総評"},"statements":[{"text":"発言要約30字以内","impact":"high","axes":{"経営思想":"一言","資本配分":"一言","株主還元":"一言","成長投資":"一言","危機対応":"一言","競争優位":"一言","経営スタイル":"一言"},"note":"本音度20字"}]}`;
    }
    const text = await callClaude([{ role: "user", content: prompt }]);
    const d = extractJSON(text);
    render(d);
  } catch(e) {
    area.innerHTML = `<div class="error">エラー: ${e.message}</div>`;
  }
}

function render(d) {
  const area = document.getElementById('results-area');
  const s = d.summary || {};
  const stmts = d.statements || [];
  const groups = {
    high: stmts.filter(x => x.impact === 'high'),
    mid: stmts.filter(x => x.impact === 'mid'),
    low: stmts.filter(x => x.impact === 'low')
  };
  const badgeClass = { high: 'badge-high', mid: 'badge-mid', low: 'badge-low' };
  const badgeLabel = { high: '高影響度', mid: '中影響度', low: '低影響度' };

  function renderGroup(items, impact) {
    if (!items.length) return '';
    return `<div class="impact-group">
      <div class="impact-header">
        <span class="badge ${badgeClass[impact]}">${badgeLabel[impact]}</span>
        <span style="font-size:13px;color:#666">${items.length}件</span>
      </div>
      ${items.map(st => `<div class="statement-card">
        <div class="statement-text">${st.text}</div>
        <div class="axes">${Object.entries(st.axes||{}).map(([k,v]) => `<div class="axis">${k}：<span>${v}</span></div>`).join('')}</div>
        ${st.note ? `<div class="note">本音度：${st.note}</div>` : ''}
      </div>`).join('')}
    </div>`;
  }

  area.innerHTML = `
    ${d.company ? `<div style="font-size:13px;color:#666;margin-top:1.25rem;margin-bottom:12px;">${d.company} の分析結果</div>` : ''}
    <div class="summary-grid">
      <div class="scard"><div class="scard-label">高影響度</div><div class="scard-val" style="color:#f87171">${s.high||0}</div></div>
      <div class="scard"><div class="scard-label">中影響度</div><div class="scard-val" style="color:#fbbf24">${s.mid||0}</div></div>
      <div class="scard"><div class="scard-label">低影響度</div><div class="scard-val" style="color:#4ade80">${s.low||0}</div></div>
      <div class="scard"><div class="scard-label">総評</div><div class="verdict">${s.verdict||'—'}</div></div>
    </div>
    <div class="section-label">発言一覧（影響度別）</div>
    ${renderGroup(groups.high,'high')}
    ${renderGroup(groups.mid,'mid')}
    ${renderGroup(groups.low,'low')}`;
}

document.getElementById('company-input')?.addEventListener('keydown', e => { if (e.key === 'Enter') analyze('auto'); });
</script>
</body>
</html>
